name: Nightly snapshot cut

# Daily: re-verify the full staging set against the Katari compiler
# version pinned by staging.toml. If everything compiles, cut an
# immutable snapshot at
# `package-sets/snapshots/snapshot-<date>-<hash>.toml` and push.
#
# If verification fails the run errors out without cutting; staging
# stays as-is and an issue should be filed against the offending
# package (= future work: automate that filing).

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cut:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install script deps
        working-directory: scripts
        run: pnpm install --frozen-lockfile

      - name: Build katari (version from staging.toml)
        id: katari
        uses: ./.github/actions/build-katari

      - name: Verify full staging set
        working-directory: scripts
        env:
          KATARI_BIN: ${{ steps.katari.outputs.binary }}
        run: pnpm tsx src/verify.ts staging

      - name: Cut snapshot
        id: cut
        working-directory: scripts
        run: |
          NAME=$(pnpm --silent tsx src/cut-snapshot.ts)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Commit + push
        if: steps.cut.outputs.name != ''
        run: |
          git config user.name 'katari-registry-bot'
          git config user.email 'noreply@github.com'
          git add package-sets/snapshots
          if git diff --cached --quiet; then
            echo "No new snapshot file to commit"
            exit 0
          fi
          git commit -m "cut: ${{ steps.cut.outputs.name }}"
          git push origin main
